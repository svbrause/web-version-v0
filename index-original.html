<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skin Type Assessment - Original</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="branding.css">
</head>
<body>
  <div id="app-container" class="app-container">
    <!-- App content will be dynamically generated by app.js -->
  </div>
  <!-- Inject environment variables before loading main script -->
  <script>
    // Set Airtable configuration from environment variables
    // These will be replaced by Vercel at build time or set manually
    window.AIRTABLE_API_KEY = window.AIRTABLE_API_KEY || '';
    window.AIRTABLE_BASE_ID = window.AIRTABLE_BASE_ID || 'appXblSpAMBQskgzB' || 'appXblSpAMBQskgzB';
    
    // If placeholders weren't replaced, try to read from a config object
    if (!window.AIRTABLE_API_KEY || window.AIRTABLE_API_KEY === '') {
      window.AIRTABLE_API_KEY = null;
    }
    if (window.AIRTABLE_BASE_ID === 'appXblSpAMBQskgzB') {
      window.AIRTABLE_BASE_ID = 'appXblSpAMBQskgzB';
    }
  </script>
  <script src="app.js"></script>
</body>
</html>
